<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create SL dasboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1><a class="back-href" href="index.html">Dashboard</a></h1>
    </header>
    <main>
        <div id="create-container">
            <form action="">
                <div class="form-buf">
                    <label class="form-label">Station</label><br>
                    <input id="station-input" placeholder="Type station name" type="text" />
                <!--<label class="error-label">Wrongly typed station name</label>-->
                </div>
                <div class="form-buf">
                    <label class="form-label">Lines</label>
                    <ul id="dashboard-filter">
                    <!--fill with found data
                    e.g.<input type="radio" name="line">205</input>
                    -->
                    <input type="checkbox" name="line"/> <label class="line-num">205</label>
                    <input type="checkbox" name="line"/> <label class="line-num">6</label>
                    <input type="checkbox" name="line"/> <label class="line-num">76</label>
                    <input type="checkbox" name="line"/> <label class="line-num">75</label>
                    </ul>
                </div>
                <div class="form-buf">
                    <label class="form-label">Dates</label>
                <ul id="time-range">
                    <div class="date-range">
                        <div class="date-sep">
                            <label class="day">Mon</label> <input type="checkbox" name="mon">
                        </div>
                        <div class="selection">
                            <input type="time" class="time-input" name="mon">
                            <p class="buf"> - </p>
                            <input type="time" class="time-input" name="mon">
                        </div>
                    </div>
                    <div class="date-range">
                        <div class="date-sep">
                        <label class="day">Tue</label> <input type="checkbox" name="tue"></div>
                        <div class="selection">
                            <input type="time" class="time-input" name="mon">
                            <p class="buf"> - </p>
                            <input type="time" class="time-input" name="mon">
                        </div>
                    </div>
                    <div class="date-range">
                        <div class="date-sep">
                        <label class="day">Wed</label><input type="checkbox" name="wed"></div>
                        <div class="selection">
                            <input type="time" class="time-input" name="mon">
                            <p class="buf"> - </p>
                            <input type="time" class="time-input" name="mon">
                        </div>
                    </div>
                    <div class="date-range">
                        <div class="date-sep">
                        <label class="day">Thu</label> <input type="checkbox" name="thu"></div>
                        <div class="selection">
                            <input type="time" class="time-input" name="mon">
                            <p class="buf"> - </p>
                            <input type="time" class="time-input" name="mon">
                        </div>
                    </div>
                    <div class="date-range">
                        <div class="date-sep">
                        <label class="day">Fri</label> <input type="checkbox" name="fri"></div>
                        <div class="selection">
                            <input type="time" class="time-input" name="mon">
                            <p class="buf"> - </p>
                            <input type="time" class="time-input" name="mon">
                        </div>
                    </div>
                    <div class="date-range">
                        <div class="date-sep">
                        <label class="day">Sat</label> <input type="checkbox" name="sat"></div>
                        <div class="selection">
                            <input type="time" class="time-input" name="mon">
                            <p class="buf"> - </p>
                            <input type="time" class="time-input" name="mon">
                        </div>
                    </div>
                    <div class="date-range">
                        <div class="date-sep">
                        <label class="day">Sun</label><input type="checkbox" name="sun"></div>
                        <div class="selection">
                            <input type="time" class="time-input" name="mon">
                            <p class="buf"> - </p>
                            <input type="time" class="time-input" name="mon">
                        </div>
                    </div>
                </ul>
                </div>
                
                
                
                <br>
                <input type="submit" value="Submit" />
            </form>

        </div>
    </main>
</body>
</html>
